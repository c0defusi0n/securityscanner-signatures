name: Propose new signatures

# Derives candidate detection signatures (regex IoCs) from the latest vulnerabilities in the
# public feed, auto-validates each one, and opens a PULL REQUEST for human review. AI-written
# detection is never merged automatically — you review and merge.
#
# Setup (once):
#   gh secret set GEMINI_API_KEY --repo c0defusi0n/securityscanner-signatures
#   # optional model override (default gemini-2.5-flash):
#   gh variable set GEMINI_MODEL --repo c0defusi0n/securityscanner-signatures --body gemini-3.5-flash
#   # and allow Actions to open PRs (done once via the API by the maintainer):
#   gh api -X PUT repos/c0defusi0n/securityscanner-signatures/actions/permissions/workflow \
#     -F default_workflow_permissions=write -F can_approve_pull_request_reviews=true

on:
  schedule:
    - cron: '0 9 * * *'    # daily 09:00 UTC (after the feed's 6h refresh)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: propose-signatures
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate candidate signatures
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}   # optional override; defaults to gemini-2.5-flash
        run: python3 scripts/propose_signatures.py

      - name: Open / update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- signatures.json; then
            echo "No vetted signatures to propose."
            exit 0
          fi
          BRANCH=auto/new-signatures
          git config user.name "c0defusi0n"
          git config user.email "cedricbonfigli@outlook.fr"
          git checkout -b "$BRANCH"
          git add signatures.json
          git commit -m "Propose new detection signatures from latest vulnerabilities"
          git push -f origin "$BRANCH"
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "🛡️ Proposed detection signatures (auto-validated — review before merge)" \
              --body-file pr_body.md
          else
            echo "PR already open for $BRANCH; branch updated with the latest proposal."
          fi
